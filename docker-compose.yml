version: '3.9'

services:
  # PostgreSQL - Airflow Metadata DB & general analytics
  postgres:
    image: postgres:15-alpine
    container_name: dataforge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataforge-network

  # Zookeeper - Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dataforge-zookeeper
    platform: linux/arm64
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    ports:
      - "2181:2181"
    networks:
      - dataforge-network

  # Kafka - Event streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dataforge-kafka
    platform: linux/arm64
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - dataforge-network

  # MinIO - S3-compatible local lakehouse storage
  minio:
    image: minio/minio:latest
    container_name: dataforge-minio
    platform: linux/arm64
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dataforge-network

  # Spark Master
  spark-master:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
      args:
        SPARK_BASE_IMAGE: docker.io/bitnami/spark:3.5.0-arm64
    container_name: dataforge-spark-master
    platform: linux/arm64
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: 'no'
      SPARK_RPC_ENCRYPTION_ENABLED: 'no'
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: 'no'
      SPARK_SSL_ENABLED: 'no'
    volumes:
      - ./spark_jobs:/opt/spark-apps
      - ./dataforge_core:/opt/dataforge_core
      - spark_master_data:/bitnami/spark
    ports:
      - "8080:8080"
      - "7077:7077"
      - "6066:6066"
    networks:
      - dataforge-network

  # Spark Worker 1
  spark-worker-1:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
      args:
        SPARK_BASE_IMAGE: docker.io/bitnami/spark:3.5.0-arm64
    container_name: dataforge-spark-worker-1
    platform: linux/arm64
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./spark_jobs:/opt/spark-apps
      - ./dataforge_core:/opt/dataforge_core
      - spark_worker_1_data:/bitnami/spark
    ports:
      - "8081:8081"
    networks:
      - dataforge-network

  # Spark Worker 2
  spark-worker-2:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
      args:
        SPARK_BASE_IMAGE: docker.io/bitnami/spark:3.5.0-arm64
    container_name: dataforge-spark-worker-2
    platform: linux/arm64
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./spark_jobs:/opt/spark-apps
      - ./dataforge_core:/opt/dataforge_core
      - spark_worker_2_data:/bitnami/spark
    ports:
      - "8082:8081"
    networks:
      - dataforge-network

  # Airflow - DAG orchestration
  airflow:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    container_name: dataforge-airflow
    platform: linux/arm64
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW_HOME: ${AIRFLOW_HOME:-/opt/airflow}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: 'false'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-Drmhze6EPcv0K0mn5fMZoSlBjnOORuyer4xwSuS3v0=}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: 'false'
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 300
      PYTHONPATH: /opt/airflow:/opt/dataforge_core
    volumes:
      - ./airflow_dags:/opt/airflow/dags
      - ./dataforge_core:/opt/dataforge_core
      - ./configs:/opt/confighour
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8888:8080"
    networks:
      - dataforge-network
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@dataforge.io ||
        echo 'Admin user already exists' &&
        airflow webserver
      "

  # dbt Core - Business transformations
  dbt:
    build:
      context: ./docker
      dockerfile: Dockerfile.dbt
    container_name: dataforge-dbt
    platform: linux/arm64
    working_dir: /opt/dbt
    volumes:
      - ./dbt:/opt/dbt
      - ./configs:/opt/configs
    environment:
      PYTHONUNBUFFERED: '1'
      DBT_PROFILES_DIR: /opt/dbt
    networks:
      - dataforge-network
    entrypoint: /bin/bash

  # DataForge Core Service
  dataforge-core:
    build:
      context: ./docker
      dockerfile: Dockerfile.dataforge
    container_name: dataforge-core
    platform: linux/arm64
    depends_on:
      - postgres
      - kafka
      - minio
      - spark-master
    environment:
      PYTHONUNBUFFERED: '1'
      DATAFORGE_ENV: ${DATAFORGE_ENV:-dev}
      SPARK_MASTER_URL: spark://spark-master:7077
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: dataforge_audit
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./dataforge_core:/opt/dataforge_core
      - ./configs:/opt/configs
      - ./data:/opt/data
    ports:
      - "5000:5000"
    networks:
      - dataforge-network
    command: python -m dataforge_core.api.server

volumes:
  postgres_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  minio_data:
  spark_master_data:
  spark_worker_1_data:
  spark_worker_2_data:
  airflow_logs:

networks:
  dataforge-network:
    driver: bridge
