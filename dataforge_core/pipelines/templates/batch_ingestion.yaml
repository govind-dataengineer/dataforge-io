# DataForge Batch Ingestion Pipeline Template
# Reusable template for common batch ingestion patterns

name: ${PIPELINE_NAME}
version: "1.0.0"
description: "Batch ingestion pipeline from ${SOURCE_TYPE} to Delta Lake"
owner: ${OWNER}

mode: batch
schedule: "${SCHEDULE:-0 2 * * *}"  # 2 AM daily
timeout_minutes: 120
retry_count: 2

source:
  type: ${SOURCE_TYPE}
  path: ${SOURCE_PATH}
  format: ${SOURCE_FORMAT:-csv}
  options:
    header: "true"
    inferSchema: "true"

transformations:
  - name: "standardize_columns"
    type: "pyspark"
    pyspark_code: |
      from pyspark.sql.functions import lower, trim, col
      
      # Standardize column names
      for column in df.columns:
        df = df.withColumnRenamed(column, column.lower().replace(' ', '_'))
      
      # Trim whitespace
      for column in df.columns:
        if df.schema[column].dataType.typeName() == 'string':
          df = df.withColumn(column, trim(col(column)))

target:
  layer: ${TARGET_LAYER:-bronze}
  table_name: ${TABLE_NAME}
  path: ${TARGET_PATH}
  format: delta
  mode: overwrite
  partition_by: ${PARTITION_COLS:-[]}

quality_rules:
  - name: "schema_validation"
    type: "schema"
    enabled: true
  
  - name: "null_check"
    type: "null"
    enabled: true
  
  - name: "duplicate_check"
    type: "duplicate"
    enabled: true

quality_threshold: 0.95

tags:
  - batch
  - ${DOMAIN:-general}
  - template-generated
