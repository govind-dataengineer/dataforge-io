# Example: E-Commerce Order Batch Pipeline
# Ingests daily orders from CSV files into Bronze layer

name: ecommerce_orders_bronze
version: "1.0.0"
description: "Daily batch ingestion of e-commerce orders"
owner: data-platform-team

mode: batch
schedule: "0 2 * * *"  # 2 AM daily
timeout_minutes: 60
retry_count: 2

source:
  type: csv
  path: s3://dataforge-raw/ecommerce/orders/
  format: csv
  options:
    header: "true"
    inferSchema: "true"
    delimiter: ","

transformations:
  - name: "normalize_column_names"
    type: "pyspark"
    input_tables: ["source"]
    output_table: "normalized_orders"
    pyspark_code: |
      from pyspark.sql.functions import lower, trim, col
      df_normalized = df
      for column in df.columns:
        df_normalized = df_normalized.withColumnRenamed(column, column.lower().replace(' ', '_'))
      df = df_normalized

target:
  layer: bronze
  table_name: ecommerce_orders_raw
  path: s3://dataforge-bronze/ecommerce/orders/
  format: delta
  mode: overwrite
  partition_by: ["order_date"]

quality_rules:
  - name: "schema_validation"
    type: "schema"
    enabled: true
  
  - name: "null_check_order_id"
    type: "null"
    sql_check: order_id
    enabled: true
  
  - name: "null_check_customer_id"
    type: "null"
    sql_check: customer_id
    enabled: true
  
  - name: "duplicate_orders"
    type: "duplicate"
    enabled: true
  
  - name: "valid_amount"
    type: "custom"
    sql_check: "SELECT COUNT(*) FROM temp_table WHERE order_amount < 0"
    enabled: true

quality_threshold: 0.99

tags:
  - ecommerce
  - orders
  - batch
  - bronze-layer

documentation_url: "https://wiki.dataforge.io/ecommerce_orders"
