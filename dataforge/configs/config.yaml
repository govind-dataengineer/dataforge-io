# DataForge Configuration - Local Development
environment: dev
version: "1.0.0"

# Storage Configuration (Local MinIO)
storage:
  type: s3  # s3, azureblob, local
  endpoint: "http://minio:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket_base: "dataforge"
  
  # Paths
  bronze_path: "s3a://dataforge/bronze"
  silver_path: "s3a://dataforge/silver"
  gold_path: "s3a://dataforge/gold"
  
  # Retention (days)
  silver_retention_days: 90
  gold_retention_days: 30

# Spark Configuration
spark:
  master: "spark://spark-master:7077"
  app_name: "DataForge"
  executor_cores: 2
  executor_memory: "2g"
  driver_memory: "2g"
  partitions: 4
  
  # Delta Lake configs
  delta:
    vacuum_retention_hours: 24
    auto_compact: true

# Database Configuration (PostgreSQL)
database:
  host: "postgres"
  port: 5432
  user: "dataforge"
  password: "dataforge_dev"
  database: "dataforge_db"
  schema: "public"

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"

# Airflow Configuration
airflow:
  dag_dir: "/opt/airflow/dags"
  logs_dir: "/opt/airflow/logs"
  base_log_folder: "/opt/airflow/logs"

# Ingestion Configuration
ingestion:
  batch_size: 1000
  partition_column: "date"
  date_format: "%Y-%m-%d"
  
  # Stock data sources
  sources:
    - name: "nifty_50"
      symbols: ["RELIANCE.NS", "TCS.NS", "INFY.NS", "HCL.NS", "HDFC.NS"]
      source_type: "yahoo_finance"
      frequency: "1d"

# Data Quality
quality:
  enabled: true
  checks:
    - name: "null_check"
      enabled: true
    - name: "schema_check"
      enabled: true
    - name: "duplicate_check"
      enabled: true

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/opt/dataforge/logs/dataforge.log"
