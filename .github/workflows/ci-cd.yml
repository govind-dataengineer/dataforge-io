# GitHub Actions CI/CD Pipeline for DataForge.io

name: DataForge CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Code Quality & Unit Tests
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint black

    - name: Lint with pylint
      run: pylint dataforge_core tests --disable=C0111,C0103

    - name: Check formatting with black
      run: black --check dataforge_core tests

    - name: Run unit tests
      env:
        POSTGRES_HOST: localhost
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      run: |
        pytest tests/ -v --cov=dataforge_core --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  # Job 2: Configuration & dbt Validation
  validate-config:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pydantic pyyaml

    - name: Validate configuration schemas
      run: |
        python scripts/validate_configs.py

    - name: Check pipeline YAML formats
      run: |
        python -c "
        import yaml
        from pathlib import Path
        for f in Path('dataforge_core/pipelines/configs').glob('*.yaml'):
          yaml.safe_load(open(f))
          print(f'✅ {f.name}')
        "

  # Job 3: Docker Build
  build-docker:
    runs-on: ubuntu-latest
    needs: [test, validate-config]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push DataForge Core image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.dataforge
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dataforge-core:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dataforge-core:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Airflow image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.airflow
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dataforge-airflow:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/dataforge-airflow:${{ github.sha }}

  # Job 4: Terraform Validation
  terraform-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: "~> 1.5"

    - name: Validate Azure Terraform
      run: |
        cd infra/azure
        terraform init -backend=false
        terraform validate

    - name: Validate AWS Terraform
      run: |
        cd infra/aws
        terraform init -backend=false
        terraform validate

  # Job 5: Deploy to Dev (on push to main)
  deploy-dev:
    runs-on: ubuntu-latest
    needs: [test, build-docker, terraform-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3

    - name: Deploy to dev environment
      env:
        DATAFORGE_ENV: dev
      run: |
        echo "Deploying to dev..."
        # Add dev deployment steps here

    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        # Add smoke tests here

    - name: Slack notification
      if: success()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "✅ DataForge deployed to dev",
            "blocks": [{
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*DataForge Dev Deployment Successful*\nCommit: ${{ github.sha }}"
              }
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job 6: Security Scan
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Job 7: dbt Test
  dbt-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up dbt
      run: |
        pip install dbt-core dbt-postgres dbt-spark

    - name: dbt parse (validate syntax)
      run: |
        cd dbt
        dbt parse --profiles-dir .

    - name: dbt compile (validate models)
      run: |
        cd dbt
        dbt compile --profiles-dir . --select +orders_analytics || true

  # Job 8: Quality Gate
  quality-gate:
    runs-on: ubuntu-latest
    needs: [test, validate-config, terraform-validate, security-scan]
    if: always()
    
    steps:
    - name: Check pass/fail
      run: |
        if [ "${{ needs.test.result }}" = "failure" ] || \
           [ "${{ needs.validate-config.result }}" = "failure" ] || \
           [ "${{ needs.terraform-validate.result }}" = "failure" ]; then
          echo "❌ Quality gate failed"
          exit 1
        fi
        echo "✅ All checks passed"
