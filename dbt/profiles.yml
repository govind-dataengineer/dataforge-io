server_port: 8000

[dataforge]
type: spark
method: databricks
host: https://{{ env_var("DATABRICKS_HOST") }}.cloud.databricks.com
http_path: /sql/1.0/warehouses/{{ env_var("DATABRICKS_HTTP_PATH") }}
token: {{ env_var("DATABRICKS_TOKEN") }}
schema: gold
database: analytics
threads: [1, 8]
audit_table: _dataforge_audit_log

[postgres_local]
type: postgres
host: postgres
user: postgres
password: postgres
port: 5432
dbname: analytics
schema: public
threads: 1
timeout_seconds: 300
