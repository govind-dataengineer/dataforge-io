name: 'dataforge_analytics'
version: '1.0.0'
config-version: 2

profile: 'dataforge'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dataforge_analytics:
    materialized: table
    
    bronze:
      materialized: view
      description: "Raw data layer"
    
    silver:
      materialized: table
      description: "Cleaned and standardized data"
      tags:
        - "silver"
    
    gold:
      materialized: table
      description: "Business-ready analytics tables"
      tags:
        - "gold"
        - "analytics"

seeds:
  dataforge_analytics:
    +full_refresh: false

tests:
  - dbt_utils
  - dbt_expectations

vars:
  dataforge_database: 'analytics'
  start_date: '2024-01-01'
