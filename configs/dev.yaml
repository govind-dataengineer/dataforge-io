# DataForge Development Configuration
# Local development environment with MinIO and Docker Compose

environment: dev

# Cloud Storage Configuration
cloud:
  storage_type: minio  # minio, adls2, s3
  endpoint: http://minio:9000
  access_key: ${MINIO_ROOT_USER:-minioadmin}
  secret_key: ${MINIO_ROOT_PASSWORD:-minioadmin}
  use_ssl: false

# Lakehouse Configuration
lakehouse:
  bronze_path: s3://dataforge-bronze/
  silver_path: s3://dataforge-silver/
  gold_path: s3://dataforge-gold/
  
  # Delta Lake settings
  delta:
    enable_cdc: false
    enable_deletion_vectors: true
    auto_compact_interval: 86400  # 24 hours
    partition_overwrite_mode: static

# Spark Configuration
spark:
  master_url: spark://spark-master:7077
  app_name: DataForge
  
  configs:
    spark.sql.extensions: io.delta.sql.DeltaSparkSessionExtension
    spark.sql.catalog.spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog
    spark.sql.shuffle.partitions: 4
    spark.driver.memory: 1g
    spark.executor.memory: 2g
    spark.executor.cores: 2
    spark.sql.adaptive.enabled: true
    spark.sql.adaptive.coalescePartitions.enabled: true

# Database Configuration
database:
  type: postgresql
  host: postgres
  port: 5432
  username: ${POSTGRES_USER:-postgres}
  password: ${POSTGRES_PASSWORD:-postgres}
  databases:
    metadata: dataforge_metadata
    audit: dataforge_audit
    staging: dataforge_staging

# Kafka Configuration
kafka:
  bootstrap_servers: kafka:9092
  schema_registry_url: http://schema-registry:8081
  consumer_group: dataforge
  auto_offset_reset: earliest
  enable_auto_commit: false

# Airflow Configuration
airflow:
  base_log_folder: /opt/airflow/logs
  dags_folder: /opt/airflow/dags
  max_active_tasks_per_dag: 5
  max_active_runs_per_dag: 1
  default_retry_count: 1
  default_retry_delay_minutes: 5

# Data Quality & Validation
data_quality:
  enable_schema_validation: true
  enable_data_profiling: false  # Set to true for higher compute costs
  enable_duplicate_check: true
  enable_null_check: true
  quality_threshold: 0.95  # 95% records must pass quality checks

# Observability
observability:
  log_level: INFO
  enable_structured_logging: true
  enable_metrics: true
  metrics_port: 9090
  enable_lineage_tracking: true
  enable_data_contracts: true

# Processing
processing:
  batch:
    default_parallelism: 4
    max_partition_bytes: 128mb
  streaming:
    checkpoint_location: /tmp/dataforge_checkpoints
    micro_batch_interval_seconds: 10

# Notifications (for failures)
notifications:
  enabled: true
  slack_webhook_url: ${SLACK_WEBHOOK_URL:-}
  email_recipients:
    - data-eng-team@dataforge.io

# Cost Optimization
cost_optimization:
  enable_partition_pruning: true
  enable_file_compaction: true
  file_compaction_interval_hours: 24
  auto_scaling_enabled: false  # Set to true for production
  compression_codec: snappy  # Options: snappy, gzip, lz4
