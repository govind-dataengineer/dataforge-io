# DataForge QA Configuration
# Staging environment for testing

environment: qa

# Cloud Storage Configuration
cloud:
  storage_type: adls2  # Azure Data Lake Storage Gen2
  endpoint: https://${STORAGE_ACCOUNT}.dfs.core.windows.net
  storage_account: ${STORAGE_ACCOUNT}
  access_key: ${STORAGE_KEY}
  use_ssl: true

# Lakehouse Configuration
lakehouse:
  bronze_path: abfss://bronze@${STORAGE_ACCOUNT}.dfs.core.windows.net/
  silver_path: abfss://silver@${STORAGE_ACCOUNT}.dfs.core.windows.net/
  gold_path: abfss://gold@${STORAGE_ACCOUNT}.dfs.core.windows.net/
  
  delta:
    enable_cdc: true
    enable_deletion_vectors: true
    auto_compact_interval: 43200  # 12 hours
    partition_overwrite_mode: static

# Spark Configuration
spark:
  master_url: spark-qa-cluster  # Azure Databricks or HDInsight
  app_name: DataForge-QA
  
  configs:
    spark.sql.extensions: io.delta.sql.DeltaSparkSessionExtension
    spark.sql.catalog.spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog
    spark.sql.shuffle.partitions: 8
    spark.driver.memory: 2g
    spark.executor.memory: 4g
    spark.executor.cores: 4
    spark.sql.adaptive.enabled: true
    spark.dynamicAllocation.enabled: true
    spark.dynamicAllocation.minExecutors: 2
    spark.dynamicAllocation.maxExecutors: 8

# Database Configuration
database:
  type: postgresql
  host: postgres-qa.postgres.database.azure.com
  port: 5432
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}
  ssl_enabled: true
  databases:
    metadata: dataforge_metadata_qa
    audit: dataforge_audit_qa
    staging: dataforge_staging_qa

# Kafka Configuration
kafka:
  bootstrap_servers: kafka-qa.dataforge.azure.com:9092
  schema_registry_url: http://schema-registry-qa:8081
  consumer_group: dataforge-qa
  auto_offset_reset: earliest
  enable_auto_commit: false

# Airflow Configuration
airflow:
  base_log_folder: /opt/airflow/logs
  dags_folder: /opt/airflow/dags
  max_active_tasks_per_dag: 10
  max_active_runs_per_dag: 2
  default_retry_count: 2
  default_retry_delay_minutes: 10

# Data Quality & Validation
data_quality:
  enable_schema_validation: true
  enable_data_profiling: true
  enable_duplicate_check: true
  enable_null_check: true
  quality_threshold: 0.98

# Observability
observability:
  log_level: DEBUG
  enable_structured_logging: true
  enable_metrics: true
  metrics_port: 9090
  enable_lineage_tracking: true
  enable_data_contracts: true

# Processing
processing:
  batch:
    default_parallelism: 8
    max_partition_bytes: 256mb
  streaming:
    checkpoint_location: abfss://checkpoints@${STORAGE_ACCOUNT}.dfs.core.windows.net/
    micro_batch_interval_seconds: 10

# Notifications
notifications:
  enabled: true
  slack_webhook_url: ${SLACK_WEBHOOK_URL}
  email_recipients:
    - data-eng-qa@dataforge.io

# Cost Optimization
cost_optimization:
  enable_partition_pruning: true
  enable_file_compaction: true
  file_compaction_interval_hours: 12
  auto_scaling_enabled: true
  compression_codec: snappy
